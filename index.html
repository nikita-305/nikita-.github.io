<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torn City Journey</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #262626;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-top: 5px solid #ff69b4; /* A pop of pink for the aesthetic */
        }
        h1, h2 {
            color: #ffffff;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .stats-table th, .stats-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .stats-table th {
            color: #ff69b4;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .value {
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00; /* Classic "profit" green */
            font-weight: bold;
        }
        .award-list {
            list-style: none;
            padding: 0;
        }
        .award-item {
            background: #333;
            margin-bottom: 8px;
            padding: 10px;
            border-left: 4px solid #ff69b4;
            border-radius: 4px;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8em;
            text-align: center;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Torn City Journey</h1>
    <p>Tracking my progress, sales, and milestones in the city.</p>

    <h2>Bazaar Analytics</h2>
    <table class="stats-table">
        <tr>
            <th>Metric</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>Total Income</td>
            <td class="value">$86,671,519</td>
        </tr>
        <tr>
            <td>Number of Customers</td>
            <td class="value">339</td>
        </tr>
        <tr>
            <td>Items Sold</td>
            <td class="value">15,412</td>
        </tr>
    </table>

    <h2>Awards & Merits</h2>
<p>I have unlocked 175 awards so far!</p>
<a href="awards.html" class="nav-button">View All Awards & Medals</a>

<style>
    .nav-button {
        display: inline-block;
        padding: 12px 24px;
        background-color: #ff69b4;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background 0.3s;
        margin-top: 10px;
    }
    .nav-button:hover {
        background-color: #e05a9e;
    }
</style>

    <div class="footer">
        Updated: April 2026
    </div>
</div>

</body>
</html>
